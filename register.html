<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(to right,#74ebd5,#ACB6E5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:900px;
            height:550px;
            background:white;
            border-radius:15px;
            overflow:hidden;
            display:flex;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .left{
            width:50%;
            background:#e8f4ff;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .left img{
            width:80%;
        }

        .right{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            width:80%;
            text-align:center;
        }

        h2{
            color:#1e3c72;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #bbb;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
        }

        button:hover{
            background:#3498db;
        }

        h4{
            margin:20px 0;
            color:gray;
        }

        a{
            text-decoration:none;
            color:#1e3c72;
            font-weight:bold;
        }

        a:hover{
            color:#3498db;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="left">
        <img src="images/register.png" alt="Register Image">
    </div>

    <div class="right">

        <div class="register-box">

            <h2>REGISTERATION FORM</h2>

           <form id="register-form">
<!-- 
    <input
        type="number"
        id="reg-id"
        name="id"
        placeholder="Enter ID"
        required> -->

    <input
        type="text"
        id="reg-name"
        name="username"
        placeholder="Enter Name"
        required>

    <input
        type="email"
        id="reg-email"
        name="email"
        placeholder="Enter Email"
        required>

    <input
        type="password"
        id="reg-password"
        name="password"
        placeholder="Enter Password"
        required>

    <select id="reg-role" name="domainRole" style="width:100%;padding:12px;margin:10px 0;border:1px solid #bbb;border-radius:8px;font-size:16px;" placeholder="Role">

        <option value="FACILITATOR">FACILITATOR</option>
        <option value="CONTRIBUTOR">CONTRIBUTOR</option>
        <option value="STAKEHOLDER">STAKEHOLDER</option>

    </select>

    <div id="reg-error"
        style="color:red;margin-top:10px;display:none;">
    </div>

    <div id="reg-success"
        style="color:green;margin-top:10px;display:none;">
    </div>

    <button type="submit" id="reg-btn">
        REGISTER
    </button>

    <h4>OR</h4>

    <a href="login.html">
        Already have an account?
        <span style="color:brown;">LOGIN</span>
    </a>

</form>

        </div>

    </div>

</div>
<script>

const API_BASE = "https://knotbackend-1.onrender.com";

document.getElementById("register-form").addEventListener("submit", async function(e){

    e.preventDefault();

   // const id = document.getElementById("reg-id").value;
    const name = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const password = document.getElementById("reg-password").value;
    const role = document.getElementById("reg-role").value;

    const errDiv = document.getElementById("reg-error");
    const sucDiv = document.getElementById("reg-success");
    const btn = document.getElementById("reg-btn");

    errDiv.style.display = "none";
    sucDiv.style.display = "none";

    if(!name || !email || !password){

        errDiv.textContent = "Please fill in all required fields.";
        errDiv.style.display = "block";
        return;
    }

    if(password.length < 6){

        errDiv.textContent = "Password must be at least 6 characters.";
        errDiv.style.display = "block";
        return;
    }

    btn.textContent = "Registering...";
    btn.disabled = true;

    try{

        const res = await fetch(API_BASE + "/auth/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
               // id: id,
                username:name,
                email:email,
                password:password,
                domainRole:role

            })

        });

        if(res.ok){

            sucDiv.textContent = "Registration Successful! Redirecting to login...";
            sucDiv.style.display = "block";

            document.getElementById("register-form").reset();

            setTimeout(function(){

                window.location.href = "login.html";

            },1500);

        }else{

            const data = await res.json().catch(function(){

                return {};

            });

            errDiv.textContent =
                data.message || "Registration failed. Email may already be in use.";

            errDiv.style.display = "block";
        }

    }catch(err){

        errDiv.textContent =
            "Cannot connect to server. Make sure backend is running on port 8082.";

        errDiv.style.display = "block";

    }finally{

        btn.textContent = "REGISTER";
        btn.disabled = false;
    }

});

</script>
</body>
</html>
